name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

  pull_request:

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zola
        run: |
          curl -sL https://github.com/getzola/zola/releases/download/v0.22.1/zola-v0.22.1-x86_64-unknown-linux-gnu.tar.gz | tar zxv
          sudo mv zola /usr/local/bin/

      - name: Build site
        run: zola build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: artishchow-com
          directory: public
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: cloudflare-preview
          message: |
            ## Cloudflare Pages Deploy

            | | |
            |---|---|
            | **Latest commit:** | `${{ github.event.pull_request.head.sha }}` |
            | **Status:** | Deploy successful |
            | **Preview URL:** | ${{ steps.deploy.outputs.url }} |
            | **Branch Preview URL:** | ${{ steps.deploy.outputs.alias }} |

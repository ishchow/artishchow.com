# The URL the site will be built for
base_url = "https://artishchow.com"

title = "artishchow"
description = "Art portfolio and gallery"
author = "Ishaat Chowdhury"

theme = "zallery"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

# Whether to build a search index to be used later on by a JavaScript library
build_search_index = true

generate_feeds = true

taxonomies = [
    {name = "tags", rss = false},
    {name = "years", rss = false, paginate_by = 12},
]

[extra]
# Navigation menu
menu = [
    {url = "about", name = "About"},
    {url = "years", name = "Archive"},
    {url = "tags", name = "Tags"},
    {url = "atom.xml", name = "Feed"},
]

theme_color = "#221c19"
author_url = "https://www.ishaat.ca"

# Gallery settings
thumbnail_size = 400
thumbnail_format = "webp"
thumbnail_quality = 90

# Image shortcode settings
covert_images = false
create_mobile_images = false
image_format = "webp"
image_quality = 90

# JavaScript features
modelviewer = false
jszoom = true

# R2 image storage
r2_public_url = "https://images.artishchow.com"

# Footer
hide_copyright = false
hide_poweredby = false

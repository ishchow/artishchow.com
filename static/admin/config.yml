backend:
  name: github
  repo: ishchow/artishchow.com
  branch: main

# Required by Sveltia CMS even though we don't use internal media storage.
media_folder: static/uploads
public_folder: /uploads

collections:
  - name: artwork
    label: Artwork
    label_singular: Artwork
    folder: content/artwork
    slug: "{{date | date('YYYYMMDD')}}-d{{day_number}}-{{weight}}-{{title}}"
    summary: "{{slug}}"
    create: true
    extension: md
    format: toml-frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: "Day Number", name: day_number, widget: number, value_type: int, min: 1, hint: "Manual day index, e.g. 19. Saved into [extra].day_number on save." }
      - { label: Weight, name: weight, widget: number, value_type: int, min: 1, default: 1, hint: "1 for the first post on a day, then increment for same-day followups." }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - label: Taxonomies
        name: taxonomies
        widget: object
        required: false
        fields:
          - label: Tags
            name: tags
            widget: list
            allow_add: true
            required: false
          - label: Years
            name: years
            widget: list
            allow_add: false
            required: false
            hint: Auto-derived from Date on save.
      - label: Extra
        name: extra
        widget: object
        fields:
          - { label: Thumbnail, name: thumbnail, widget: string, hint: "R2 filename, e.g. 20251119_D4_Kasasagi.jpg" }
      - { label: Body, name: body, widget: markdown }

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager — artishchow</title>
  </head>
  <body>
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
    <script>
      const R2_BASE = "https://images.artishchow.com";

      function toPositiveInteger(value, fallback) {
        const parsed = Number.parseInt(value, 10);
        return Number.isInteger(parsed) && parsed > 0 ? parsed : fallback;
      }

      // Auto-prepend R2 base URL to bare thumbnail filenames before saving
      CMS.registerEventListener({
        name: "preSave",
        handler: ({ entry }) => {
          let nextEntry = entry;
          const thumb = entry.getIn(["data", "extra", "thumbnail"]);
          const date = entry.getIn(["data", "date"]);
          const dayNumber = toPositiveInteger(entry.getIn(["data", "day_number"]), null);
          const weight = toPositiveInteger(entry.getIn(["data", "weight"]), 1);
          const dateString = date instanceof Date ? date.toISOString().slice(0, 10) : String(date || "");
          const year = /^\d{4}/.test(dateString) ? dateString.slice(0, 4) : "";

          if (thumb && !thumb.startsWith("http")) {
            nextEntry = nextEntry.setIn(["data", "extra", "thumbnail"], `${R2_BASE}/${thumb}`);
          }

          if (dayNumber !== null) {
            nextEntry = nextEntry.setIn(["data", "day_number"], dayNumber);
            nextEntry = nextEntry.setIn(["data", "extra", "day_number"], dayNumber);
          }

          nextEntry = nextEntry.setIn(["data", "weight"], weight);
          nextEntry = nextEntry.setIn(["data", "extra", "weight"], weight);

          if (year) {
            nextEntry = nextEntry.setIn(["data", "taxonomies", "years"], [year]);
          }

          return nextEntry;
        },
      });

      CMS.registerEditorComponent({
        id: "r2-image",
        label: "R2 Image",
        icon: "image",
        fields: [
          { name: "src", label: "Filename", widget: "string", hint: "e.g. 20260325_D17_Test.jpg" },
          { name: "alt", label: "Alt text", widget: "string" },
          { name: "text", label: "Caption", widget: "string", required: false },
        ],
        pattern: /\{\{\s*img\(src="(?<src>[^"]*)"(?:,\s*alt="(?<alt>[^"]*)")?(?:,\s*text="(?<text>[^"]*)")?\)\s*\}\}/,
        toBlock: ({ src, alt, text } = {}) => {
          if (!src) return "";
          const url = src.startsWith("http") ? src : `https://images.artishchow.com/${src}`;
          let s = `{{ img(src="${url}", alt="${alt || ""}")`;
          if (text) s = `{{ img(src="${url}", alt="${alt || ""}", text="${text}")`;
          return s + " }}";
        },
        toPreview: ({ src, alt, text } = {}) => {
          if (!src) return "";
          const url = src.startsWith("http") ? src : `https://images.artishchow.com/${src}`;
          let html = `<figure><img src="${url}" alt="${alt || ""}">`;
          if (text) html += `<figcaption>${text}</figcaption>`;
          return html + "</figure>";
        },
      });
    </script>
  </body>
</html>
